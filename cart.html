<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ตะกร้าสินค้า - FinEra</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Kanit', sans-serif; }
        body { background-color: #f4f4f4; padding: 20px; }

        .cart-page-container {
            max-width: 900px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 20px;
        }

        /* ฝั่งรายการสินค้า */
        .cart-items { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .cart-item { display: flex; align-items: center; gap: 15px; padding: 15px 0; border-bottom: 1px solid #eee; }
        .cart-item img { width: 70px; height: 70px; object-fit: contain; }
        .item-info h4 { font-size: 14px; margin-bottom: 5px; }
        .item-info p { color: #2d7a4d; font-weight: bold; }

        /* ฝั่งสรุปยอด */
        .cart-summary { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); height: fit-content; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 15px; }
        .total-row { border-top: 2px solid #eee; pt: 15px; font-weight: bold; font-size: 18px; color: #2d7a4d; margin-top: 10px; padding-top: 15px; }
        
        .btn-checkout { background: #2d7a4d; color: white; border: none; width: 100%; padding: 12px; border-radius: 10px; cursor: pointer; font-size: 16px; transition: 0.3s; margin-top: 10px; }
        .btn-checkout:hover { background: #23613d; }

        /* --- Popup สรุปสั่งซื้อ (IMG_1765) --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: none; /* ปิดไว้ก่อน */
            justify-content: center; align-items: center;
            z-index: 1000;
        }
        .modal-box {
            background: white; width: 90%; max-width: 650px;
            padding: 30px; border-radius: 20px; position: relative;
        }
        .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; margin-bottom: 5px; color: #666; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        
        .payment-method { background: #f9f9f9; padding: 15px; border-radius: 10px; font-size: 14px; }
        .btn-confirm { background: #4CAF50; color: white; border: none; width: 100%; padding: 12px; border-radius: 10px; cursor: pointer; margin-top: 20px; }
        
        .back-link { text-align: center; display: block; margin-top: 15px; color: #888; text-decoration: none; font-size: 13px; }
    </style>
</head>
<body>

    <div class="cart-page-container">
        <div class="cart-items">
            <h2 style="margin-bottom: 20px;">🛒 ตะกร้าสินค้า</h2>
            <div class="cart-item">
                <img src="https://via.placeholder.com/70" alt="product">
                <div class="item-info">
                    <h4>ไลฟ์ มัลติวิตามิน วิตามินรวม</h4>
                    <p>฿390 x 1</p>
                </div>
            </div>
            <div class="cart-item">
                <img src="https://via.placeholder.com/70" alt="product">
                <div class="item-info">
                    <h4>Life Vitamin B Complex</h4>
                    <p>฿390 x 1</p>
                </div>
            </div>
            <a href="index.html" class="back-link" style="text-align: left;">← เลือกซื้อสินค้าเพิ่ม</a>
        </div>

        <div class="cart-summary">
            <h3>ยอดชำระ</h3>
            <div class="summary-row" style="margin-top: 20px;">
                <span>ราคาสินค้า</span>
                <span>฿780</span>
            </div>
            <div class="summary-row">
                <span>ค่าจัดส่ง</span>
                <span>฿50</span>
            </div>
            <div class="total-row summary-row">
                <span>รวมทั้งสิ้น</span>
                <span>฿830</span>
            </div>
            <button class="btn-checkout" onclick="openModal()">ชำระเงิน</button>
        </div>
    </div>

    <div id="checkoutModal" class="modal-overlay">
        <div class="modal-box">
            <h2 style="margin-bottom: 20px; color: #2d7a4d;">📝 สรุปคำสั่งซื้อ</h2>
            <div class="modal-grid">
                <div>
                    <div class="form-group">
                        <label>ชื่อผู้รับ</label>
                        <input type="text" placeholder="ชื่อ-นามสกุล" value="คุณพาม">
                    </div>
                    <div class="form-group">
                        <label>เบอร์โทรศัพท์</label>
                        <input type="text" placeholder="080-xxx-xxxx">
                    </div>
                    <div class="form-group">
                        <label>ที่อยู่จัดส่ง</label>
                        <textarea rows="3" placeholder="บ้านเลขที่, ถนน, ตำบล..."></textarea>
                    </div>
                </div>
                <div class="payment-method">
                    <p><b>รายการ:</b> 2 รายการ</p>
                    <p><b>ค่าจัดส่ง:</b> ฿50</p>
                    <p style="font-size: 18px; color: #2d7a4d; margin: 10px 0;"><b>ยอดรวม: ฿830</b></p>
                    <hr style="margin: 10px 0; border: 0; border-top: 1px solid #ddd;">
                    <p style="margin-bottom: 10px;"><b>ช่องทางชำระเงิน</b></p>
                    <label style="display: block; margin-bottom: 5px;">
                        <input type="radio" name="pay" checked> โอนเงินผ่านธนาคาร
                    </label>
                    <label style="display: block;">
                        <input type="radio" name="pay"> เก็บเงินปลายทาง
                    </label>
                </div>
            </div>
            <button class="btn-confirm" onclick="location.href='receipt.html'">ยืนยันสั่งซื้อและชำระเงิน</button>
            <a href="#" class="back-link" onclick="closeModal()">ยกเลิก</a>
        </div>
    </div>

    <script>
        function openModal() {
            document.getElementById('checkoutModal').style.display = 'flex';
        }
        function closeModal() {
            document.getElementById('checkoutModal').style.display = 'none';
        }
    </script>
</body>
</html>
