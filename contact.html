<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ติดต่อเรา - FinEra</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Kanit', sans-serif;
        }

        /* พื้นหลังมืดจางๆ แบบ Overlay */
        body {
            background-color: rgba(0, 0, 0, 0.5); 
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* กล่องเนื้อหาหลัก */
        .contact-modal {
            background: white;
            width: 90%;
            max-width: 650px;
            padding: 30px;
            border-radius: 15px;
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* หัวข้อติดต่อเรา */
        .header {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        .header h2 {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 22px;
        }

        .header h2 i::before {
            content: "📞"; /* ไอคอนโทรศัพท์ */
        }

        /* ส่วนแบ่งคอลัมน์ด้านใน */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        h4 {
            margin-bottom: 10px;
            font-size: 16px;
            color: #000;
        }

        p, ul {
            font-size: 13px;
            color: #555;
            line-height: 1.6;
            list-style: none;
        }

        /* ส่วนแผนที่ร้าน */
        .map-box img {
            width: 100%;
            border-radius: 5px;
            border: 1px solid #ddd;
        }

        .map-link {
            display: block;
            font-size: 10px;
            color: #007bff;
            text-decoration: none;
            margin-top: 5px;
        }

        /* ส่วนรายการติดต่อ */
        .contact-list li {
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ปุ่มปิดด้านล่าง */
        .btn-close {
            display: block;
            width: fit-content;
            margin: 0 auto;
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 14px;
            text-decoration: underline;
        }

        /* ปรับแต่งสำหรับมือถือ */
        @media (max-width: 600px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="contact-modal">
        <div class="header">
            <h2>ติดต่อเรา</h2>
        </div>

        <div class="content-grid">
            <div class="info-box">
                <h4>FinEra Health Store</h4>
                <p>ร้านจำหน่ายผลิตภัณฑ์สุขภาพและความงาม คัดสรรสินค้าคุณภาพ</p>
                <ul style="margin-top: 10px;">
                    <li>• วิตามินและอาหารเสริม</li>
                    <li>• ผลิตภัณฑ์ความงาม</li>
                    <li>• ดูแลสุขภาพ</li>
                </ul>
            </div>

            <div class="map-box">
                <h4>แผนที่ร้าน</h4>
                <img src="https://maps.googleapis.com/maps/api/staticmap?center=Bangkok&zoom=14&size=200x120&key=YOUR_API_KEY" alt="แผนที่จำลอง">
                <a href="#" class="map-link">View larger map</a>
            </div>

            <div class="contact-list">
                <h4>ติดต่อ</h4>
                <ul>
                    <li>📍 วุฒากาศ</li>
                    <li>📞 080-154-7313</li>
                    <li>📧 finera.health@gmail.com</li>
                </ul>
            </div>
        </div>

        <button class="btn-close" onclick="location.href='index.html'">ปิด</button>
    </div>

</body>
</html>
